<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sub And Sup</title>
</head>
<body>
   <h4>Sub Tag</h4>
   <p>we use this in chemistry</p>
   <div>
      <span>Water Formula :</span>
      <span>
         H<sub>2</sub>O
      </span>
   </div>

   <hr>
   <h4>Sup Tag</h4>
   <p>we use this in maths</p>

   <div>
      <span>Math Formula: </span>
      <span>
         (a+b)<sup>2</sup>
         =
         a<sup>2</sup>+
         b<sup>2</sup>+
         2ab
      </span>

   </div>


</body>
</html>
