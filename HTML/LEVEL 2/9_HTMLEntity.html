<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>HTML Entity</title>
</head>
<body>
   <h1>a &lt; b</h1>
   <h1>a &gt; b</h1>
   <h1>a &amp; b</h1>

   <!-- mdn unicode to decimal -->
    <h1>Printing Stars</h1>
    <h3>With Name: &bigstar;</h3>
    <h3>Without Name : &#9733; &#9829;</h3>

   <h1>quotes &quot; </h1>

   <h1>a &nbsp; &nbsp; &nbsp; b </h1>
</body>
</html>
