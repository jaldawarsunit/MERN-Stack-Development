<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Assignment</title>
</head>

<body>
   <h1>HTML Level 3</h1>

   <hr>

   <table border="black">
      <caption>Student Information</caption>
      <tr>
         <th rowspan="6">Info</th>
         <th rowspan="2">Name</th>
         <th colspan="2">Address</th>
      </tr>
      <tr>
         <th>City</th>
         <th>House</th>
      </tr>
      <tr>
         <td>A</td>
         <td>Delhi</td>
         <td>1</td>
      </tr>
      <tr>
         <td>B</td>
         <td>Mumbai</td>
         <td>2</td>
      </tr>
      <tr>
         <td>C</td>
         <td>Kolkata</td>
         <td>3</td>
      </tr>
      <tr>
         <td>D</td>
         <td>Pune</td>
         <td>4</td>
      </tr>
   </table>

   <hr>

   <form action="">
      <label for="name">Name : </label>
      <input type="text" name="name" id="name">
      <br>
      <label for="gender">Sex:</label>
      <input type="radio" name="gender" id="male" value="male">
      <label for="male">Male</label>
      <input type="radio" name="gender" id="female" value="female">
      <label for="female">Female</label>
      <br>
      <label for="Country">Country: </label>
      <select name="Country" id="Country">
         <option > Select an option </option>
         <option value="India">India</option>
         <option value="Nepal">Nepal</option>
         <option value="USA">USA</option>
         <option value="Canada">Canada</option>
      </select>
      <br>
      <label for="Message"> Message:</label>
      <br>
      <textarea name="Message" id="Message" rows="4"></textarea>

      <br>
      <input type="checkbox" name="check" id="check" value="subscribe">
      <label for="check">Subscribe ?</label>

      <br>
      <button type="submit">Submit</button>

   </form>

   <hr>

   <H4>FeedBack Form</H4>
   <form action="">

      <label for="name">Name: </label>
      <input type="text" name="name" id="name" placeholder="Write your name">
      <br>
      <br>
      <label for="email">Email: </label>
      <input type="text" name="email" id="email" placeholder="Write your email">
      <br>
      <br>
      <label for="Message"> Message:</label>
      <br>
      <textarea name="Message" id="Message" rows="4"></textarea>
      <br>
      <br>

      <label for="rate">Rate us our of 5 :</label>
      <br>
      <input type="radio" name="rate" id="1" value="1">
      <label for="1">1</label>
      <br>
      <input type="radio" name="rate" id="2" value="2">
      <label for="2">2</label>
      <br>
      <input type="radio" name="rate" id="3" value="3">
      <label for="3">3</label>
      <br>
      <input type="radio" name="rate" id="4" value="4">
      <label for="4">4</label>
      <br>
      <input type="radio" name="rate" id="5" value="5">
      <label for="5">5</label>
      <br>
      <br>
      <button type="submit">Send your message!</button>
   </form>

</body>

</html>
