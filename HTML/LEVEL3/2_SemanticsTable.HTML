<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Tables</title>
</head>
<body>
   <table border="black">
      <caption>Fruits</caption>
<!-- table header part this is -->
      <thead>
         <tr>
            <th>Items</th>
            <th>Prices</th>
         </tr>
      </thead>
<!-- table body we use here -->
      <tbody>
         <tr>
            <td>Frooti</td>
            <td>10</td>
         </tr>
         <tr>
            <td>Samosa</td>
            <td>12</td>
         </tr>
         <tr>
            <td>Chips</td>
            <td>20</td>
         </tr>
      </tbody>
<!-- table footer we use here -->
      <tfoot>
         <tr>
            <td>sum</td>
            <td>100</td>
         </tr>
      </tfoot>
   </table>
   
</body>
</html>
