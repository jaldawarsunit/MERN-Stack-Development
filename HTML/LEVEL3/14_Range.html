<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Range</title>
</head>
<body>
   <form action="">
      <label for="volume">Volume</label>
      <input type="range" name="vol" id="volume" max="100" min="0" step="15" value="75">

      <button type="submit">Submit</button>
   </form>
</body>
</html>
